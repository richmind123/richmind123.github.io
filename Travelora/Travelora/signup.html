<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Travelora</title>
  <meta name="description" content="Create your free Travelora account and start booking incredible travel experiences today." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>✈️</text></svg>">
</head>
<body>

  <div class="auth-page">

    <!-- LEFT: Visual -->
    <div class="auth-visual" style="background-image: linear-gradient(rgba(10,15,30,0.5), rgba(10,15,30,0.7)), url('https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1400&q=80');">
      <div class="auth-visual-brand">✈ Travelora</div>
      <div>
        <h2 class="auth-visual-quote">"Travel is the only thing you buy that makes you richer."</h2>
        <p class="auth-visual-sub">Join 500,000+ travelers worldwide</p>
      </div>
    </div>

    <!-- RIGHT: Form -->
    <div class="auth-form-side">
      <div class="auth-form-box">

        <div class="badge-pill" style="margin-bottom: 16px;">🚀 Get Started</div>
        <h1 class="auth-form-title">Create Your Account</h1>
        <p class="auth-form-subtitle">Start your journey with Travelora — it's completely free.</p>

        <!-- Error Message -->
        <div id="signupError" style="background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); border-radius: 10px; padding: 12px 16px; font-size: 0.875rem; color: #ff6b6b; margin-bottom: 20px; display: none;"></div>

        <form id="signupForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="signupName">Full Name</label>
            <input class="form-control" type="text" id="signupName" placeholder="John Doe" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="signupEmail">Email Address</label>
            <input class="form-control" type="email" id="signupEmail" placeholder="you@email.com" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="signupPassword">Password</label>
            <div style="position: relative;">
              <input class="form-control" type="password" id="signupPassword" placeholder="Min. 8 characters" required style="padding-right: 48px;" />
              <button type="button" id="toggleSignupPwd" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--white-70); font-size: 1rem;">👁</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="signupConfirm">Confirm Password</label>
            <input class="form-control" type="password" id="signupConfirm" placeholder="Re-enter password" required />
          </div>
          <label class="checkbox-group" style="margin-bottom: 24px;">
            <input type="checkbox" id="agreeSignup" required />
            I agree to Travelora's <a href="#" class="auth-link">Terms of Service</a> and <a href="#" class="auth-link">Privacy Policy</a>
          </label>
          <button type="submit" class="btn-primary-custom" style="width: 100%; justify-content: center; padding: 15px; border-radius: 12px; font-size: 1rem;">
            Create Account →
          </button>
        </form>

        <p style="text-align: center; font-size: 0.9rem; color: var(--white-70); margin-top: 24px;">
          Already have an account? <a href="login.html" class="auth-link">Login →</a>
        </p>

      </div>
    </div>
  </div>

  <script src="js/travel.js"></script>
</body>
</html>
